<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦊 Fox Arena — Classement</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--or:#FF6B1A;--am:#FFB347;--dk:#0A0500;--dp:#140900;--bk:#3D2200;--gd:#FFD700;--cr:#FFF3E0;--tx:#FFE0B2;--glow:rgba(255,107,26,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dk);font-family:'Nunito',sans-serif;color:var(--tx);min-height:100vh;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,215,0,0.7),transparent),radial-gradient(1px 1px at 80% 10%,rgba(255,179,71,0.6),transparent),radial-gradient(1.5px 1.5px at 45% 55%,rgba(255,107,26,0.5),transparent),radial-gradient(1px 1px at 90% 75%,rgba(255,215,0,0.6),transparent);background-size:400px 400px;animation:twinkle 7s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:0.5}100%{opacity:0.9}}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 40px;background:rgba(10,5,0,0.95);backdrop-filter:blur(12px);border-bottom:2px solid var(--or);box-shadow:0 2px 20px var(--glow);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--or);text-decoration:none;letter-spacing:3px;text-shadow:0 0 14px var(--glow);}
.nav-links{display:flex;gap:5px;}
.nav-links a{color:var(--am);text-decoration:none;font-weight:800;font-size:0.82rem;padding:7px 13px;border-radius:18px;transition:all 0.2s;border:1px solid transparent;}
.nav-links a:hover{border-color:var(--am);background:rgba(255,179,71,0.1);}
.nav-links a.active{background:rgba(255,107,26,0.2);border-color:var(--or);color:var(--gd);}

main{max-width:1000px;margin:0 auto;padding:50px 20px;position:relative;z-index:1;}

.page-header{text-align:center;margin-bottom:50px;}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,4rem);color:var(--or);text-shadow:0 0 30px var(--glow);letter-spacing:4px;margin-bottom:8px;}
.page-header p{color:var(--am);font-weight:700;font-size:1rem;}

/* Podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;margin-bottom:50px;}
.pod-slot{display:flex;flex-direction:column;align-items:center;gap:6px;}
.pod-block{border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;width:110px;transition:all 0.3s;}
.pod-block:hover{transform:translateY(-4px);}
.p1 .pod-block{height:140px;background:linear-gradient(180deg,#FFD700,#CC9900);color:#3D2200;border:2px solid #FFD700;box-shadow:0 0 30px rgba(255,215,0,0.4);}
.p2 .pod-block{height:100px;background:linear-gradient(180deg,#C0C0C0,#888);color:#222;border:2px solid #C0C0C0;}
.p3 .pod-block{height:75px;background:linear-gradient(180deg,#CD7F32,#8B4513);color:#FFF3E0;border:2px solid #CD7F32;}
.pod-name{font-weight:800;font-size:0.85rem;color:var(--cr);}
.pod-char{font-size:1.4rem;}
.pod-score{font-size:0.72rem;color:var(--am);font-weight:700;}

/* Filters */
.filter-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.f-tab{padding:7px 18px;border-radius:22px;border:1px solid var(--bk);background:transparent;color:var(--am);font-family:'Nunito',sans-serif;font-weight:800;font-size:0.8rem;cursor:pointer;transition:all 0.2s;}
.f-tab.active{background:var(--or);border-color:var(--am);color:white;}
.f-tab:hover:not(.active){border-color:var(--am);}
.search-bar{display:flex;gap:10px;align-items:center;background:var(--dp);border:1px solid var(--bk);border-radius:12px;padding:8px 16px;margin-bottom:20px;}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--cr);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:600;}
.search-bar input::placeholder{color:#3D2200;}

/* Table */
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:2px solid var(--or);}
th{text-align:left;padding:10px 14px;font-size:0.72rem;color:var(--am);text-transform:uppercase;letter-spacing:1.5px;font-family:'Bebas Neue',sans-serif;}
tbody tr{border-bottom:1px solid var(--bk);transition:all 0.2s;}
tbody tr:hover{background:rgba(255,107,26,0.05);}
td{padding:11px 14px;font-size:0.88rem;font-weight:700;}
.rk{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#3D2200;width:44px;}
.rk.r1{color:var(--gd)!important;}.rk.r2{color:#C0C0C0!important;}.rk.r3{color:#CD7F32!important;}
.nm{color:var(--cr);display:flex;align-items:center;gap:8px;}
.sc{color:var(--gd);}.kd{color:var(--am);}.br{font-size:1.2rem;}

footer{background:var(--dk);border-top:1px solid var(--bk);padding:36px;text-align:center;}
.ft-logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--or);text-decoration:none;letter-spacing:4px;display:block;margin-bottom:12px;}
.ft-links{display:flex;gap:20px;justify-content:center;margin-bottom:10px;}
.ft-links a{color:var(--am);text-decoration:none;font-size:0.82rem;font-weight:800;}
.ft-links a:hover{color:var(--gd);}
footer p{color:#3D2200;font-size:0.75rem;}
</style>
</head>
<body>
<div class="stars"></div>
<nav>
  <a class="nav-logo" href="index.html">🦊 FOX ARENA</a>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
    <a href="game.html">▶ Jeu</a>
    <a href="leaderboard.html" class="active">🏆 Classement</a>
    <a href="about.html">À propos</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>🏆 CLASSEMENT</h1>
    <p>Les plus grands guerriers de la forêt</p>
  </div>

  <div class="podium" id="podium"></div>

  <div class="filter-row">
    <button class="f-tab active" onclick="setFilter('kills',this)">⚔️ Éliminations</button>
    <button class="f-tab" onclick="setFilter('wins',this)">🏆 Victoires</button>
    <button class="f-tab" onclick="setFilter('gems',this)">💎 Gemmes</button>
  </div>
  <div class="search-bar">
    <span style="color:#5C3300">🔍</span>
    <input type="text" placeholder="Rechercher un joueur..." oninput="doSearch(this.value)"/>
  </div>
  <table>
    <thead><tr>
      <th>#</th><th>Joueur</th><th>⚔️ Élims</th><th>🏆 Victoires</th><th>💎 Gemmes</th><th>K/D</th><th>Renard</th>
    </tr></thead>
    <tbody id="lb-body"></tbody>
  </table>
</main>

<footer>
  <a class="ft-logo" href="index.html">🦊 FOX ARENA</a>
  <div class="ft-links">
    <a href="index.html">Accueil</a><a href="game.html">Jouer</a>
    <a href="leaderboard.html">Classement</a><a href="about.html">À propos</a>
  </div>
  <p>© 2025 Fox Arena — Fait avec ❤️ dans la forêt 🌲</p>
</footer>

<script>
const PLAYERS=[
  {name:'🦊 RenardRoi',   kills:1842,wins:234,gems:8120,deaths:180,char:'🦊',badge:'👑'},
  {name:'🎯 VixarPro',    kills:1654,wins:198,gems:6540,deaths:220,char:'🎯',badge:'🥈'},
  {name:'🐺 GrizzMaster', kills:1423,wins:178,gems:4210,deaths:195,char:'🐺',badge:'🥉'},
  {name:'💨 SpeedFox',    kills:1208,wins:145,gems:5880,deaths:240,char:'🦊',badge:'⭐'},
  {name:'🔥 FlameVix',    kills:1090,wins:132,gems:3980,deaths:278,char:'🎯',badge:'🔥'},
  {name:'🌿 BushHunter',  kills:987, wins:118,gems:7120,deaths:310,char:'🦊',badge:'🌿'},
  {name:'⚡ LightningFox',kills:856, wins:102,gems:2870,deaths:290,char:'🎯',badge:'⚡'},
  {name:'🛡️ TankLord',   kills:780, wins:98, gems:1540,deaths:180,char:'🐺',badge:'🛡️'},
  {name:'🌙 NightFox',    kills:698, wins:84, gems:3650,deaths:320,char:'🦊',badge:'🌙'},
  {name:'💎 GemKing',     kills:612, wins:76, gems:9840,deaths:350,char:'🐺',badge:'💎'},
  {name:'🎭 TricksterVix',kills:540, wins:65, gems:2230,deaths:380,char:'🎯',badge:'🎭'},
  {name:'🌲 ForestGuard', kills:490, wins:58, gems:4120,deaths:400,char:'🦊',badge:'🌲'},
];

let curFilter='kills',searchQ='';

function sorted(){
  let d=[...PLAYERS];
  if(curFilter==='wins') d.sort((a,b)=>b.wins-a.wins||b.kills-a.kills);
  else if(curFilter==='gems') d.sort((a,b)=>b.gems-a.gems||b.kills-a.kills);
  else d.sort((a,b)=>b.kills-a.kills);
  if(searchQ) d=d.filter(p=>p.name.toLowerCase().includes(searchQ.toLowerCase()));
  return d;
}
function renderPodium(){
  const top=PLAYERS.slice(0,3);
  const order=[top[1],top[0],top[2]],ranks=[2,1,3];
  document.getElementById('podium').innerHTML=order.map((p,i)=>`
    <div class="pod-slot p${ranks[i]}">
      <div class="pod-char">${p.badge}</div>
      <div class="pod-name">${p.name}</div>
      <div class="pod-score">⚔️ ${p.kills} élims</div>
      <div class="pod-block">${ranks[i]}</div>
    </div>`).join('');
}
function renderTable(){
  const d=sorted();
  document.getElementById('lb-body').innerHTML=d.map((p,i)=>{
    const rk=PLAYERS.indexOf(p)+1;
    const kd=(p.kills/Math.max(1,p.deaths)).toFixed(2);
    return `<tr>
      <td class="rk ${rk===1?'r1':rk===2?'r2':rk===3?'r3':''}">${rk}</td>
      <td><div class="nm"><span>${p.badge}</span>${p.name}</div></td>
      <td class="sc">${p.kills.toLocaleString()}</td>
      <td class="sc">${p.wins}</td>
      <td style="color:#00DDFF;font-weight:700">${p.gems.toLocaleString()}</td>
      <td class="kd">${kd}</td>
      <td class="br">${p.char}</td>
    </tr>`;
  }).join('');
}
function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.f-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderTable();
}
function doSearch(q){searchQ=q;renderTable();}
renderPodium();renderTable();
</script>
</body>
</html>
