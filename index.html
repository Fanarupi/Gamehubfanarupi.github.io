<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlobInfo – L'info sur les jeux vidéo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- BLOBS décoratifs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="logo-blob">🫧</span>
      <span class="logo-text">BlobInfo</span>
    </div>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">Jeux</a>
      <a href="#">News</a>
      <a href="#">À propos</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Toute l'info sur<br><span class="gradient-text">tes jeux préférés</span></h1>
    <p class="hero-sub">Recherche un jeu et explore ses infos, son histoire, ses tips et bien plus.</p>

    <!-- BARRE DE RECHERCHE -->
    <div class="search-wrapper">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Recherche un jeu... (ex: Minecraft, Zelda...)"
          autocomplete="off"
        />
        <button onclick="doSearch()">Chercher</button>
      </div>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </section>

  <!-- JEUX POPULAIRES -->
  <section class="popular">
    <h2>Jeux populaires</h2>
    <div class="game-grid" id="gameGrid">
      <!-- injecté par JS -->
    </div>
  </section>

  <!-- MODAL JEU -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- AQUARIUM AXOLOTL -->
  <footer>
    <div class="aquarium">
      <div class="water-top"></div>
      <canvas id="aquariumCanvas" width="1200" height="160"></canvas>
      <div class="footer-text">
        <span>🫧 BlobInfo © 2025</span>
        <span>Fait avec amour et blobs bleus 💙</span>
      </div>
    </div>
  </footer>

  <script src="games.js"></script>
  <script src="aquarium.js"></script>
  <script src="main.js"></script>
</body>
</html>
